<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="feed.css" />
    <title>Multigram</title>
  </head>
  <body>
    <div class="feed-container">
      <div class="nav-bar">
        <div class="left-nav-bar">
          <img class="multiverse-logo-white" src="/assets/readmeImages/feedImages/multiverse-logo-white.png"/>
          <img class="arrow-down-icon" src="/assets/readmeImages/feedImages/arrow-down-icon.png"/>
        </div>
        <div class="right-nav-bar">
          <img class="post-image" src="assets/readmeImages/feedImages/post.png"/>
          <img class="post-image" src="assets/readmeImages/feedImages/notification.png"/>
            
        </div>

      </div>
      <div class="feed-info-bar">
        <div class="left-info-bar">
          <img class="multiverse-round-logo" src="/assets/readmeImages/feedImages/multiversee.png"/>
          <div class="post-data">
            <div class="account-data">
              <div>joinmultiverse</div>
              <img class="verified-account" src="/assets/readmeImages/feedImages/verified.png"/>
            </div>
            <div class="song-data">
              <div>SZA</div>
              <div> * </div>
              <div>Kill Bill (Sped Up Version)</div>
            </div>
          </div>
        </div>
        <div class="right-info-bar">
          <div>...</div>
        </div>
      </div>
      <div class="video-container">

      </div>
      <div class="interaction-bar">
        <div class="left-interaction-bar">
          <div class="interaction-buttons">
            <img class="heart-image" src="assets/readmeImages/feedImages/heart.png"/>
            <img class="comment-image" src="assets/readmeImages/feedImages/comment.png"/>
            <img class="share-image" src="assets/readmeImages/feedImages/share.png"/>
            
          </div>
          <div class="interaction-data">
            <div>427 Likes</div>
          </div>
        </div>
        <div class="right-interaction-bar">
          <img class="fav-image" src="assets/readmeImages/feedImages/fav.png"/>
           
        </div>
      </div>
      <div class="post-text">
        <div>ACCOUNT : TEXT</div>
      </div>
      <div class="comments">
        <div>View all 20 comments</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
