<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Multigram</title>
  </head>
  <body>
    <div class="feed-container">
      <div class="nav-bar">
        <div class="left-nav-bar">
          <h1>LOGO</h1>
          <p>DROPDOWN</p>
        </div>
        <div class="right-nav-bar">
          <img class="post-image" src="/Users/chintasameera/Instagram-Clone/assets/readmeImages/feedImages/post.png"/>
          <img class="post-image" src="/Users/chintasameera/Instagram-Clone/assets/readmeImages/feedImages/notification.png"/>
            
        </div>

      </div>
      <div class="feed-info-bar">
        <div class="left-info-bar">
          <div>ACCOUNT LOGO</div>
          <div class="post-data">
            <div class="account-data">
              <div>account name</div>
              <div>checkmark</div>
            </div>
            <div class="song-data">
              <div>ARTIST</div>
              <div> * </div>
              <div>SONG</div>
            </div>
          </div>
        </div>
        <div class="right-info-bar">
          <div>...</div>
        </div>
      </div>
      <div class="video-container">

      </div>
      <div class="interaction-bar">
        <div class="left-interaction-bar">
          <div class="interaction-buttons">
            <img class="heart-image" src="/Users/chintasameera/Instagram-Clone/assets/readmeImages/feedImages/heart.png"/>
            <img class="comment-image" src="/Users/chintasameera/Instagram-Clone/assets/readmeImages/feedImages/comment.png"/>
            <img class="share-image" src="/Users/chintasameera/Instagram-Clone/assets/readmeImages/feedImages/share.png"/>
            
          </div>
          <div class="interaction-data">
            <div>427 Likes</div>
          </div>
        </div>
        <div class="right-interaction-bar">
          <img class="fav-image" src="/Users/chintasameera/Instagram-Clone/assets/readmeImages/feedImages/fav.png"/>
           
        </div>
      </div>
      <div class="post-text">
        <div>ACCOUNT : TEXT</div>
      </div>
      <div class="comments">
        <div>View all 20 comments</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
